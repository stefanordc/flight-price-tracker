name: Flight Price Scraper

on:
  schedule:
    # O GitHub usa UTC (Brasília +3h). 
    # Para rodar das 16h às 23h BRT:
    
    # 1. Das 19:00 às 23:00 UTC (16h às 20h BRT)
    - cron: '0 19-23 * * *'
    
    # 2. Das 00:00 às 02:00 UTC (21h às 23h BRT)
    - cron: '0 0-2 * * *'
    
  workflow_dispatch: # Permite rodar manualmente para testar

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Rodar scraper
        run: python scraper/scraper.py
        env:
          PYTHONPATH: .

      # PASSO IMPORTANTE: Salvar as alterações (CSV/JSON) de volta no GitHub
      - name: Commit e Push dos dados
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "Auto-update: Scraper $(date)" || echo "Sem mudanças"
          git push
